<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="Cache-Control" content="no-store" />
    <title>Ajuda - Session Transfer</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #101312;
        --panel: #1b1f1d;
        --panel-2: #141715;
        --line: #2f3933;
        --text: #f1f5f2;
        --muted: #a8b2ac;
        --primary: #25c46a;
        --primary-hover: #2fd979;
        --code: #0f1210;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        padding: 24px;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(37, 196, 106, .14), transparent 34%),
          var(--bg);
        color: var(--text);
      }

      .shell {
        width: min(1120px, 100%);
        margin: 0 auto;
        display: grid;
        grid-template-columns: 260px minmax(0, 1fr);
        gap: 20px;
        align-items: start;
      }

      aside,
      article {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: color-mix(in srgb, var(--panel) 96%, transparent);
        box-shadow: 0 24px 80px rgba(0, 0, 0, .22);
      }

      aside {
        position: sticky;
        top: 24px;
        padding: 16px;
      }

      article {
        min-height: calc(100vh - 48px);
        padding: 34px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 16px;
        font-weight: 800;
      }

      .mark {
        width: 34px;
        height: 34px;
        display: grid;
        place-items: center;
        border-radius: 8px;
        background: var(--primary);
        color: #07120c;
        font-size: 13px;
        font-weight: 900;
      }

      nav {
        display: grid;
        gap: 8px;
      }

      nav a,
      .home-link {
        min-height: 38px;
        display: flex;
        align-items: center;
        border-radius: 7px;
        padding: 0 10px;
        color: var(--muted);
        text-decoration: none;
      }

      nav a[aria-current="page"] {
        background: rgba(37, 196, 106, .13);
        color: var(--text);
      }

      .home-link {
        margin-top: 12px;
        border: 1px solid var(--line);
      }

      .quick-actions {
        display: grid;
        gap: 8px;
        margin-top: 16px;
        padding-top: 16px;
        border-top: 1px solid var(--line);
      }

      .side-button {
        min-height: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 7px;
        padding: 0 12px;
        font-weight: 800;
        text-align: center;
        text-decoration: none;
      }

      .side-button.primary {
        background: var(--primary);
        color: #07120c;
      }

      .side-button.primary:hover {
        background: var(--primary-hover);
      }

      .side-button.secondary {
        border: 1px solid var(--line);
        background: var(--panel-2);
        color: var(--text);
      }

      .side-button.secondary:hover,
      .home-link:hover {
        border-color: #3e4a43;
        background: #222823;
        color: #ffffff;
      }

      .side-button:focus-visible,
      .home-link:focus-visible {
        outline: 2px solid rgba(37, 196, 106, .45);
        outline-offset: 2px;
      }

      .doc {
        max-width: 820px;
      }

      .doc h1,
      .doc h2,
      .doc h3,
      .doc h4 {
        margin: 0;
        line-height: 1.22;
        letter-spacing: 0;
      }

      .doc h1 {
        margin-bottom: 12px;
        font-size: clamp(28px, 4vw, 42px);
      }

      .doc h2 {
        margin-top: 34px;
        padding-top: 26px;
        border-top: 1px solid var(--line);
        font-size: 22px;
      }

      .doc h3 {
        margin-top: 24px;
        font-size: 18px;
      }

      .doc p,
      .doc li {
        color: var(--muted);
        font-size: 15px;
        line-height: 1.72;
      }

      .doc p {
        margin: 14px 0 0;
      }

      .doc ul,
      .doc ol {
        display: grid;
        gap: 7px;
        margin: 14px 0 0;
        padding-left: 22px;
      }

      .doc strong {
        color: var(--text);
      }

      .doc a {
        color: var(--primary);
      }

      .doc code {
        border: 1px solid var(--line);
        border-radius: 5px;
        padding: 2px 5px;
        background: var(--code);
        color: #dce8e0;
        font-size: .92em;
      }

      .doc pre {
        margin: 16px 0 0;
        overflow: auto;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--code);
      }

      .doc pre code {
        display: block;
        border: 0;
        padding: 16px;
        background: transparent;
        color: #dce8e0;
        white-space: pre;
      }

      .doc blockquote {
        margin: 18px 0 0;
        border-left: 3px solid var(--primary);
        padding: 4px 0 4px 14px;
        color: var(--muted);
      }

      .doc table {
        width: 100%;
        margin-top: 16px;
        border-collapse: collapse;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 8px;
      }

      .doc th,
      .doc td {
        border-bottom: 1px solid var(--line);
        padding: 10px 12px;
        text-align: left;
        vertical-align: top;
      }

      .doc th {
        color: var(--text);
        background: var(--panel-2);
      }

      .doc td {
        color: var(--muted);
      }

      .state {
        display: grid;
        place-items: center;
        min-height: 280px;
        color: var(--muted);
      }

      @media (max-width: 820px) {
        body {
          padding: 16px;
        }

        .shell {
          grid-template-columns: 1fr;
        }

        aside {
          position: static;
        }

        article {
          min-height: auto;
          padding: 24px 20px;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <aside>
        <div class="brand">
          <span class="mark">ST</span>
          <span>Ajuda</span>
        </div>
        <nav id="docNav" aria-label="Documentos"></nav>
        <div class="quick-actions" aria-label="Ações rápidas">
          <a class="side-button primary" href="./demo.html">Abrir demo técnica</a>
        </div>
        <a class="home-link" href="./">Voltar ao conector</a>
      </aside>

      <article>
        <div id="content" class="doc">
          <div class="state">Carregando documento...</div>
        </div>
      </article>
    </main>

    <script>
      (function () {
        "use strict";

        var DOCUMENTS = {
          passkey: {
            title: "Problemas de passkey",
            file: "./passkey.md"
          }
        };

        var content = document.getElementById("content");
        var nav = document.getElementById("docNav");
        var params = new URLSearchParams(window.location.search);
        var activeDoc = params.get("doc") || "passkey";

        if (!Object.prototype.hasOwnProperty.call(DOCUMENTS, activeDoc)) {
          activeDoc = "passkey";
        }

        function escapeHtml(value) {
          return String(value)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
        }

        function sanitizeHref(value) {
          var href = String(value || "").trim();
          if (/^(https?:\/\/|\.{0,2}\/|#)/i.test(href)) {
            return escapeHtml(href);
          }
          return "#";
        }

        function renderInline(value) {
          var codeTokens = [];
          var text = String(value || "").replace(/`([^`]+)`/g, function (_, code) {
            var token = "\u0000CODE" + codeTokens.length + "\u0000";
            codeTokens.push("<code>" + escapeHtml(code) + "</code>");
            return token;
          });

          text = escapeHtml(text)
            .replace(/\[([^\]]+)\]\(([^)]+)\)/g, function (_, label, href) {
              return '<a href="' + sanitizeHref(href) + '">' + label + "</a>";
            })
            .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
            .replace(/\*([^*]+)\*/g, "<em>$1</em>");

          codeTokens.forEach(function (html, index) {
            text = text.replace("\u0000CODE" + index + "\u0000", html);
          });

          return text;
        }

        function splitTableRow(line) {
          return line.trim().replace(/^\|/, "").replace(/\|$/, "").split("|").map(function (cell) {
            return cell.trim();
          });
        }

        function isTableSeparator(line) {
          return /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/.test(line || "");
        }

        function renderMarkdown(markdown) {
          var lines = String(markdown || "").replace(/\r\n?/g, "\n").split("\n");
          var html = [];
          var paragraph = [];
          var listType = "";
          var listItems = [];
          var inCode = false;
          var codeLines = [];

          function flushParagraph() {
            if (!paragraph.length) return;
            html.push("<p>" + renderInline(paragraph.join(" ")) + "</p>");
            paragraph = [];
          }

          function flushList() {
            if (!listType) return;
            html.push("<" + listType + ">" + listItems.map(function (item) {
              return "<li>" + renderInline(item) + "</li>";
            }).join("") + "</" + listType + ">");
            listType = "";
            listItems = [];
          }

          function flushCode() {
            html.push("<pre><code>" + escapeHtml(codeLines.join("\n")) + "</code></pre>");
            codeLines = [];
          }

          for (var index = 0; index < lines.length; index += 1) {
            var line = lines[index];
            var trimmed = line.trim();

            if (inCode) {
              if (/^```/.test(trimmed)) {
                flushCode();
                inCode = false;
              } else {
                codeLines.push(line);
              }
              continue;
            }

            if (/^```/.test(trimmed)) {
              flushParagraph();
              flushList();
              inCode = true;
              codeLines = [];
              continue;
            }

            if (!trimmed) {
              flushParagraph();
              flushList();
              continue;
            }

            if (trimmed.indexOf("|") !== -1 && isTableSeparator(lines[index + 1])) {
              flushParagraph();
              flushList();
              var headers = splitTableRow(trimmed);
              index += 2;
              var rows = [];
              while (index < lines.length && lines[index].trim().indexOf("|") !== -1) {
                rows.push(splitTableRow(lines[index]));
                index += 1;
              }
              index -= 1;
              html.push(
                "<table><thead><tr>" +
                  headers.map(function (cell) { return "<th>" + renderInline(cell) + "</th>"; }).join("") +
                  "</tr></thead><tbody>" +
                  rows.map(function (row) {
                    return "<tr>" + row.map(function (cell) {
                      return "<td>" + renderInline(cell) + "</td>";
                    }).join("") + "</tr>";
                  }).join("") +
                  "</tbody></table>"
              );
              continue;
            }

            var heading = /^(#{1,4})\s+(.+)$/.exec(trimmed);
            if (heading) {
              flushParagraph();
              flushList();
              var level = heading[1].length;
              html.push("<h" + level + ">" + renderInline(heading[2]) + "</h" + level + ">");
              continue;
            }

            var unordered = /^[-*]\s+(.+)$/.exec(trimmed);
            if (unordered) {
              flushParagraph();
              if (listType && listType !== "ul") flushList();
              listType = "ul";
              listItems.push(unordered[1]);
              continue;
            }

            var ordered = /^\d+\.\s+(.+)$/.exec(trimmed);
            if (ordered) {
              flushParagraph();
              if (listType && listType !== "ol") flushList();
              listType = "ol";
              listItems.push(ordered[1]);
              continue;
            }

            var quote = /^>\s?(.+)$/.exec(trimmed);
            if (quote) {
              flushParagraph();
              flushList();
              html.push("<blockquote>" + renderInline(quote[1]) + "</blockquote>");
              continue;
            }

            paragraph.push(trimmed);
          }

          if (inCode) flushCode();
          flushParagraph();
          flushList();

          return html.join("\n");
        }

        function renderNav() {
          nav.innerHTML = Object.keys(DOCUMENTS).map(function (key) {
            var doc = DOCUMENTS[key];
            var href = "./passkey.html";
            var current = key === activeDoc ? ' aria-current="page"' : "";
            return '<a href="' + href + '"' + current + ">" + escapeHtml(doc.title) + "</a>";
          }).join("");
        }

        function showError(message) {
          content.innerHTML = '<div class="state">' + escapeHtml(message) + "</div>";
        }

        renderNav();

        fetch(DOCUMENTS[activeDoc].file, { cache: "no-store" })
          .then(function (response) {
            if (!response.ok) throw new Error("Documento não encontrado.");
            return response.text();
          })
          .then(function (markdown) {
            content.innerHTML = renderMarkdown(markdown);
            document.title = DOCUMENTS[activeDoc].title + " - Ajuda";
          })
          .catch(function (error) {
            showError(error.message || "Não foi possível carregar o documento.");
          });
      })();
    </script>
  </body>
</html>
