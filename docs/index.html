<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Session Transfer Bridge</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #111413;
        color: #f2f5f3;
      }

      main {
        width: min(560px, 100%);
        display: grid;
        gap: 14px;
      }

      h1 {
        margin: 0;
        font-size: 20px;
      }

      p {
        margin: 0;
        color: #aab4ae;
        line-height: 1.5;
      }

      a {
        color: #25c46a;
      }

      .links {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 4px;
      }

      .button {
        min-height: 40px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0 14px;
        border-radius: 7px;
        background: #25c46a;
        color: #07120c;
        font-weight: 700;
        text-decoration: none;
      }

      code {
        color: #dbe6df;
        overflow-wrap: anywhere;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Session Transfer Bridge</h1>
      <p>Arquivos estáticos para integração com a extensão.</p>
      <div class="links">
        <a class="button" href="./import/?client=minha-loja&token=00000000-0000-4000-8000-000000000000">Testar link único</a>
        <a href="./demo.html">Abrir demo técnica</a>
      </div>
      <p>
        Método simples via link único:
        <code>/import/?client=minha-loja&amp;token=00000000-0000-4000-8000-000000000000</code>
      </p>
    </main>
  </body>
</html>
